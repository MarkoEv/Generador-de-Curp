<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>generador-de-curp</title>
</head>

<body>
  <div class="content-form">
    <h2 class="cadena">
      {
      <b class="st1">C</b>lave
      <b class="st2">Ú</b>nica de
      <b class="st3">R</b>egistro de
      <b class="st4">P</b>oblación
      }
    </h2>
    <form>
      <label>Nombres:</label>
      <input type="text" id="primerName">
      <label>Apellido Paterno:</label>
      <input type="text" id="apellidoP">
      <label>Apellido Materno:</label>
      <input type="text" id="apellidoM">
      <legend>Fecha De Nacimiento</legend>
      <select id="days"></select>
      <select id="months"></select>
      <select id="years"></select>
      <label>¿En Que Estado Naciste?</label>
      <select id="estates"></select>
      <label>Genero</label>
      <select id="genero">
        <option value="h">Hombre</option>
        <option value="m">Mujer</option>
      </select>
      <div class="result">
        <label>TU CURP</label>
        <br>
        <br>
        <p id="curp1"></p>
        <hr>
      </div>
      <br>
      <button type="button">Generar CURP</button>
    </form>
  </div>
  <!-- scripts --Generadores -->
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script src="src/script.js"></script>
  <script src="src/numRandom.js"></script>
</body>

</html>
