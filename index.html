<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Generador de curp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <!-- Link Swiper's CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  <link rel="stylesheet" href="src/style.css">
</head>

<body class="bg-gray-400 dark:bg-black/25  font-serif text-[14px] text-white m-0 p-0">
  <header class="h-[40%]">
    <div class="swiper-slide text-center place-content-center  bg-black/80 flex justify-center items-center ">
      <div class="top-0 absolute right-0 p-5 flex justify-between items-center gap-5">
        <label class="flex cursor-pointer justify-end top-0 items-center gap-4">
          <div class="">
            <svg width="27" height="27" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
              transform="rotate(0 0 0)">
              <path
                d="M12 2.24902C6.51613 2.24902 2 6.70064 2 12.249C2 16.6361 4.87097 20.3781 8.87097 21.7329C9.3871 21.8297 9.54839 21.5071 9.54839 21.2813C9.54839 21.0555 9.54839 20.4103 9.51613 19.5393C6.74194 20.1845 6.16129 18.1845 6.16129 18.1845C5.70968 17.0555 5.03226 16.7329 5.03226 16.7329C4.12903 16.0877 5.06452 16.0877 5.06452 16.0877C6.06452 16.12 6.6129 17.12 6.6129 17.12C7.48387 18.6684 8.96774 18.2168 9.51613 17.9264C9.6129 17.2813 9.87097 16.8297 10.1613 16.5716C7.96774 16.3458 5.6129 15.4748 5.6129 11.6684C5.6129 10.5716 6.03226 9.70064 6.64516 9.02322C6.54839 8.79741 6.19355 7.76515 6.74194 6.37806C6.74194 6.37806 7.6129 6.11999 9.51613 7.41031C10.3226 7.18451 11.1613 7.05548 12.0323 7.05548C12.9032 7.05548 13.7742 7.15225 14.5484 7.41031C16.4516 6.15225 17.2903 6.37806 17.2903 6.37806C17.8387 7.73289 17.5161 8.79741 17.3871 9.02322C18.0323 9.70064 18.4194 10.6039 18.4194 11.6684C18.4194 15.4748 16.0645 16.3458 13.871 16.5716C14.2258 16.8942 14.5484 17.5393 14.5484 18.4426C14.5484 19.7974 14.5161 20.8619 14.5161 21.1845C14.5161 21.4426 14.7097 21.7329 15.1935 21.6361C19.129 20.3135 22 16.6039 22 12.1845C21.9677 6.70064 17.4839 2.24902 12 2.24902Z"
                fill="#ffffff" />
            </svg>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
          </svg>
          <input type="checkbox" value="synthwave" class="toggle theme-controller" />
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </label>
      </div>
      <div class="">
        <h1 class="text-2xl" id="text"></h1>
        <span class="cursor text-4xl">|</span>
      </div>
    </div>
  </header>
  <!-- Swiper -->
  <div class="swiper mySwiper w-full h-[60%]">
    <div class="swiper-wrapper">

      <div class="swiper-slide text-center text-2xl bg-black/80 ">
        <div class="grid justify-center gap-3 ">
          <h1 class="text-2xl" id="instrucciones"></h1>
          <button class="btn border rounded-2xl bg-white w-60 h-20 text-gray-900 text-3xl">Empezar</button>
        </div>
      </div>

      <div class="swiper-slide text-center  text-2xl bg-black/80 ">
        <div class="flex justify-center gap-3 ">
          <div>
            <input type="text" class="text-3xl w-100 h-20 bg-white/5 border rounded-3xl py-1.5 pr-3 pl-1 text-center"
              placeholder="Escribe tu nombre">
          </div>
        </div>
      </div>

      <div class="swiper-slide text-center text-2xl bg-black/80 flex justify-center items-center">
        <div class="grid ">
          <div class="grid p-5">APELLIDOS</div>
          <div class="">
            <input type="text" class="text-3xl w-100 h-20 bg-white/5 border rounded-3xl py-1.5 pr-3 pl-1 text-center"
              placeholder="PATERNO">
            <input type="text" class="text-3xl w-100 h-20 bg-white/5 border rounded-3xl py-1.5 pr-3 pl-1 text-center"
              placeholder="MATERNO">
          </div>
        </div>
      </div>

      <div class="swiper-slide text-center text-2xl bg-black/80 flex justify-center items-center">
        <div class="p-5">Fecha de nacimiento</div>
        <div class="flex justify-center gap-3.5">
          <select type="nu" class="text-3xl w-50 h-20 bg-white/5 border rounded-3xl  text-center">
            <option>Día</option>
          </select>
          <select type="nu" class="text-3xl w-50 h-20 bg-white/5 border rounded-3xl  text-center">
            <option>Mes</option>
          </select>
          <select type="nu" class="text-3xl w-50 h-20 bg-white/5 border rounded-3xl  text-center">
            <option>Año</option>
          </select>
        </div>
      </div>

      <div class="swiper-slide text-center text-2xl bg-black/80 flex justify-center items-center">
        <div class="p-5"> En que Estado naciste?</div>
        <select class="text-3xl w-60 h-20 bg-white/5 border rounded-3xl py-1.5 pr-3 pl-1 text-center ">
          <option class="text-black/50">Selecciona</option>
        </select>
      </div>

      <div class="swiper-slide text-center text-2xl bg-black/80 flex justify-center items-center">
        <div class="grid p-5">Genero</div>
        <button class="btn py-6 px-6 border rounded-2xl bg-blue-400 hover:bg-blue-400/70 cursor-pointer">HOMBRE</button>
        <button class="btn py-6 px-6 border rounded-2xl bg-pink-400 hover:bg-pink-400/70 cursor-pointer">MUJER</button>
      </div>
    </div>
    <div class="swiper-pagination"></div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <!-- Initialize Swiper -->

  <script type="module" src="src/main.js"></script>
</body>

</html>
